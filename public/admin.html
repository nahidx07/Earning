<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - LakhpotiBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div id="login-box" class="max-w-md mx-auto bg-gray-800 p-6 rounded-xl shadow-2xl">
        <h2 class="text-2xl font-bold mb-4">Admin Login</h2>
        <input id="email" type="email" placeholder="Email" class="w-full p-2 mb-2 rounded bg-gray-700">
        <input id="pass" type="password" placeholder="Password" class="w-full p-2 mb-4 rounded bg-gray-700">
        <button onclick="login()" class="w-full bg-blue-600 p-2 rounded font-bold">Login</button>
    </div>

    <div id="admin-dashboard" class="hidden max-w-4xl mx-auto space-y-6">
        <h1 class="text-3xl font-bold border-b pb-2">Control Panel</h1>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gray-800 p-4 rounded-xl">
                <h3 class="font-bold mb-2">Referral Settings</h3>
                <label class="text-xs">Bonus Percentage (%)</label>
                <input id="ref-percent" type="number" class="w-full p-2 bg-gray-700 rounded mb-2">
                <button onclick="saveSettings()" class="bg-green-600 px-4 py-1 rounded text-sm">Save</button>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl">
                <h3 class="font-bold mb-2">Announcement</h3>
                <textarea id="notice" class="w-full p-2 bg-gray-700 rounded text-sm" rows="3"></textarea>
                <button onclick="saveSettings()" class="bg-green-600 px-4 py-1 rounded text-sm mt-2">Update Notice</button>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl">
            <h3 class="font-bold mb-4">Active Tasks</h3>
            <div class="flex gap-2 mb-4">
                <input id="task-name" placeholder="Task Name" class="bg-gray-700 p-2 rounded text-sm">
                <input id="task-reward" placeholder="Reward (BDT)" class="bg-gray-700 p-2 rounded text-sm">
                <button class="bg-blue-600 px-4 rounded text-sm">+ Add Task</button>
            </div>
        </div>
    </div>

    <script>
        let auth = { email: '', password: '' };

        async function login() {
            auth.email = document.getElementById('email').value;
            auth.password = document.getElementById('pass').value;
            
            const res = await fetch('/api/admin-api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getStats', auth })
            });

            if (res.ok) {
                const data = await res.json();
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                // Load existing settings
                document.getElementById('ref-percent').value = data.settings.ref_percent;
                document.getElementById('notice').value = data.settings.notice;
            } else {
                alert("Login Failed!");
            }
        }

        async function saveSettings() {
            const data = {
                ref_percent: document.getElementById('ref-percent').value,
                notice: document.getElementById('notice').value
            };
            await fetch('/api/admin-api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'updateSettings', data, auth })
            });
            alert("Settings Updated!");
        }
    </script>
</body>
</html>
