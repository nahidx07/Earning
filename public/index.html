<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lakhpoti BD - User App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .tab-content { display: none; min-height: 80vh; }
        .active-tab { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-bg { background: #161b2a; border: 1px solid #232a3d; }
        .active-nav { color: #facc15 !important; }
        .nav-item { transition: all 0.3s; }
    </style>
</head>
<body class="pb-24">

    <div class="p-4 flex justify-between items-center sticky top-0 bg-[#0b0f1a] z-50 border-b border-gray-800">
        <div class="flex items-center gap-3">
            <img id="u-pic" class="w-10 h-10 rounded-full border-2 border-yellow-500 shadow-lg" src="https://via.placeholder.com/100">
            <div>
                <p id="u-name" class="font-bold text-sm">Loading...</p>
                <p class="text-[10px] text-yellow-500 font-mono italic">Premium Member ●</p>
            </div>
        </div>
        <div class="bg-[#161b2a] px-3 py-1.5 rounded-full text-yellow-500 font-bold border border-yellow-500/30 text-sm">
            ৳ <span id="top-bal">0.00</span>
        </div>
    </div>

    <div id="content-area" class="p-4">
        
        <div id="home-tab" class="tab-content active-tab space-y-4">
            <div class="card-bg p-6 rounded-3xl text-center relative overflow-hidden">
                <p class="text-gray-400 text-xs uppercase tracking-widest">বর্তমান ব্যালেন্স</p>
                <h1 class="text-5xl font-black text-yellow-500 my-3 tracking-tighter">৳ <span id="h-bal">0.00</span></h1>
                <div class="flex gap-3 mt-4">
                    <button onclick="switchTab('earn')" class="flex-1 bg-yellow-500 text-black font-bold py-3 rounded-xl shadow-lg active:scale-95 transition">আর্ন করুন</button>
                    <button onclick="switchTab('wallet')" class="flex-1 bg-gray-800 py-3 rounded-xl font-bold active:scale-95 transition">উত্তোলন</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="card-bg p-4 rounded-2xl flex flex-col items-center justify-center border-b-2 border-blue-500">
                    <i class="fas fa-eye text-blue-500 mb-2"></i>
                    <p id="h-ads" class="text-xl font-bold">0</p>
                    <p class="text-[10px] text-gray-400 uppercase">মোট এড দেখা</p>
                </div>
                <div class="card-bg p-4 rounded-2xl flex flex-col items-center justify-center border-b-2 border-green-500">
                    <i class="fas fa-users text-green-500 mb-2"></i>
                    <p id="h-ref" class="text-xl font-bold">0</p>
                    <p class="text-[10px] text-gray-400 uppercase">সফল রেফারেল</p>
                </div>
            </div>
            
            <div class="card-bg p-4 rounded-2xl">
                <p class="text-xs text-gray-400 mb-2 italic"><i class="fas fa-bullhorn text-yellow-500 mr-2"></i>নোটিশ বোর্ড:</p>
                <p id="announcement" class="text-sm">প্রতি রেফারে ১০% কমিশন এবং আনলিমিটেড এড দেখে ইনকাম করুন!</p>
            </div>
        </div>

        <div id="leaderboard-tab" class="tab-content space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-2xl font-black text-yellow-500 italic"><i class="fas fa-crown mr-2"></i>লিডারবোর্ড</h2>
                <span class="text-[10px] bg-yellow-500/20 text-yellow-500 px-2 py-1 rounded">টপ ২০ রেফারকারী</span>
            </div>
            <div id="lb-list" class="space-y-2">
                <div class="text-center py-20 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                    <p>লোড হচ্ছে...</p>
                </div>
            </div>
        </div>

        <div id="earn-tab" class="tab-content space-y-3">
            <h2 class="text-xl font-bold text-yellow-500"><i class="fas fa-tasks mr-2"></i>টাস্ক সেন্টার</h2>
            <div class="card-bg p-4 rounded-2xl flex justify-between items-center border-l-4 border-yellow-500">
                <div>
                    <p class="font-bold">ভিডিও এড দেখুন</p>
                    <p class="text-[10px] text-gray-400">প্রতি এড ০.৫০৳</p>
                </div>
                <button onclick="alert('Ad Loading...')" class="bg-yellow-500 text-black px-6 py-2 rounded-xl font-black text-xs shadow-md">প্লে এড</button>
            </div>
        </div>

        <div id="wallet-tab" class="tab-content">
            <h2 class="text-xl font-bold text-yellow-500 mb-4">টাকা উত্তোলন</h2>
            <div class="space-y-4">
                <div class="card-bg p-4 rounded-2xl">
                    <p class="text-xs text-gray-400 mb-2">পেমেন্ট পদ্ধতি</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="bg-pink-600 p-3 rounded-xl font-bold text-sm">বিকাশ</button>
                        <button class="bg-orange-600 p-3 rounded-xl font-bold text-sm">নগদ</button>
                    </div>
                </div>
                <input type="number" placeholder="পরিমাণ" class="w-full bg-[#1c2237] p-4 rounded-2xl border border-gray-700 outline-none focus:border-yellow-500">
                <button class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-bold shadow-xl">সাবমিট করুন</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#161b2a] border-t border-gray-800 px-2 py-3 flex justify-around items-center rounded-t-[30px] shadow-2xl z-50">
        <button onclick="switchTab('home')" id="nav-home" class="nav-item flex flex-col items-center text-gray-500 active-nav">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">হোম</span>
        </button>
        <button onclick="switchTab('earn')" id="nav-earn" class="nav-item flex flex-col items-center text-gray-500">
            <i class="fas fa-layer-group text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">আর্ন</span>
        </button>
        
        <div class="relative -mt-12">
            <div class="absolute inset-0 bg-yellow-500 blur-xl opacity-20 rounded-full scale-150"></div>
            <button onclick="switchTab('leaderboard')" id="nav-leaderboard" class="relative bg-yellow-500 w-16 h-16 rounded-full border-[6px] border-[#0b0f1a] flex items-center justify-center text-black shadow-2xl active:scale-90 transition">
                <i class="fas fa-trophy text-2xl"></i>
            </button>
        </div>

        <button onclick="switchTab('wallet')" id="nav-wallet" class="nav-item flex flex-col items-center text-gray-500">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">ওয়ালেট</span>
        </button>
        <button onclick="switchTab('profile')" id="nav-profile" class="nav-item flex flex-col items-center text-gray-500">
            <i class="fas fa-user-circle text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">প্রোফাইল</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-pic').src = user.photo_url || 'https://ui-avatars.com/api/?name=' + user.first_name;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(tabId + '-tab').classList.add('active-tab');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            if(document.getElementById('nav-' + tabId)) document.getElementById('nav-' + tabId).classList.add('active-nav');
            
            if(tabId === 'leaderboard') fetchLeaderboard();
        }

        async function fetchLeaderboard() {
            const lbList = document.getElementById('lb-list');
            // ডেমো ডাটা (ফায়ারবেস কানেক্ট হলে এখান থেকে অটো আপডেট হবে)
            const demoUsers = [
                {name: "Karim", refs: 145}, {name: "Rahat", refs: 120},
                {name: "Abir", refs: 98}, {name: "Sajib", refs: 85},
                {name: "Nahid", refs: 72}, {name: "Jahid", refs: 60}
            ];

            lbList.innerHTML = '';
            demoUsers.forEach((u, i) => {
                lbList.innerHTML += `
                    <div class="card-bg p-4 rounded-2xl flex justify-between items-center border-l-2 ${i < 3 ? 'border-yellow-500' : 'border-transparent'}">
                        <div class="flex items-center gap-4">
                            <span class="text-lg font-black ${i === 0 ? 'text-yellow-500' : 'text-gray-500'}">#${i + 1}</span>
                            <div>
                                <p class="font-bold text-sm">${u.name} ${i === 0 ? '👑' : ''}</p>
                                <p class="text-[10px] text-gray-500 uppercase">Verified User</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-yellow-500 font-black">${u.refs}</p>
                            <p class="text-[9px] text-gray-500 uppercase">Referrals</p>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
