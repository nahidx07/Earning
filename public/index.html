<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; }
        .tab-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body class="pb-20">
    <div class="p-4 flex justify-between items-center bg-[#1e293b]">
        <div class="flex items-center gap-2">
            <img id="u-pic" class="w-10 h-10 rounded-full border border-yellow-500">
            <div>
                <p id="u-name" class="font-bold text-sm"></p>
                <p class="text-[10px] text-yellow-500">BRONZE ●</p>
            </div>
        </div>
        <div class="bg-black/30 p-2 rounded-full text-yellow-500 font-bold">
            ৳ <span id="top-balance">0.00</span> BDT
        </div>
    </div>

    <div id="content" class="p-4">
        <div id="home" class="tab-content active space-y-4">
            <div class="bg-[#1e293b] p-6 rounded-2xl text-center border border-gray-700">
                <p class="text-gray-400 text-xs">মোট ব্যালেন্স</p>
                <h1 class="text-4xl font-black text-yellow-500 my-2">৳ <span id="h-bal">0.00</span></h1>
                <div class="flex gap-2">
                    <button onclick="tab('earn')" class="flex-1 bg-yellow-500 text-black font-bold py-2 rounded-lg">আর্ন করুন</button>
                    <button onclick="tab('wallet')" class="flex-1 bg-gray-700 py-2 rounded-lg">উত্তোলন</button>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-[#1e293b] p-4 rounded-xl text-center">
                    <p id="h-ads" class="text-xl font-bold">0</p>
                    <p class="text-[10px] text-gray-400">এড দেখা</p>
                </div>
                <div class="bg-[#1e293b] p-4 rounded-xl text-center">
                    <p id="h-ref" class="text-xl font-bold">0</p>
                    <p class="text-[10px] text-gray-400">রেফারেল</p>
                </div>
            </div>
        </div>

        <div id="earn" class="tab-content space-y-3">
            <h3 class="font-bold text-yellow-500">আর্ন সেন্টার</h3>
            <div class="bg-[#1e293b] p-4 rounded-xl flex justify-between items-center">
                <p class="text-sm">এড দেখুন (০.৫০ টাকা)</p>
                <button class="bg-yellow-500 text-black px-4 py-1 rounded-lg text-xs font-bold">দেখুন</button>
            </div>
        </div>
        
        <div id="wallet" class="tab-content">
            <h3 class="font-bold mb-4">টাকা উত্তোলন</h3>
            <input type="number" placeholder="পরিমাণ" class="w-full bg-[#1e293b] p-3 rounded-lg mb-2">
            <button class="w-full bg-yellow-500 text-black py-3 rounded-xl font-bold">রিকোয়েস্ট সাবমিট</button>
        </div>
    </div>

    <div class="fixed bottom-0 w-full bg-[#1e293b] flex justify-around p-3 border-t border-gray-800">
        <button onclick="tab('home')" class="flex flex-col items-center text-xs"><i class="fas fa-home"></i>হোম</button>
        <button onclick="tab('earn')" class="flex flex-col items-center text-xs"><i class="fas fa-layer-group"></i>আর্ন</button>
        <button onclick="tab('wallet')" class="flex flex-col items-center text-xs"><i class="fas fa-wallet"></i>ওয়ালেট</button>
        <button onclick="tab('profile')" class="flex flex-col items-center text-xs"><i class="fas fa-user"></i>প্রোফাইল</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
