<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lakhpoti BD - White Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            background: #F8F9FB; 
            color: #1A1C1E; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* প্রিমিয়াম হোয়াইট কার্ড ও শ্যাডো */
        .premium-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.03);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
            border-radius: 24px;
        }

        .gold-action-btn {
            background: linear-gradient(135deg, #2D2E32 0%, #1A1C1E 100%);
            color: #FFD700;
        }

        .gold-text {
            background: linear-gradient(135deg, #B8860B, #8A6D3B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ট্যাব ট্রানজিশন */
        .tab-content { display: none; animation: fadeIn 0.4s ease-out; }
        .active-tab { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-item { color: #94A3B8; transition: all 0.3s; }
        .nav-active { color: #1A1C1E !important; }

        /* বটম বার ডিজাইন */
        .bottom-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-[#F8F9FB]/80 backdrop-blur-lg z-50">
        <div class="flex items-center gap-3">
            <img id="u-pic" class="w-10 h-10 rounded-full bg-gray-200 border border-white shadow-sm">
            <div>
                <h2 id="u-name" class="font-bold text-sm tracking-tight text-gray-800">Loading...</h2>
                <p class="text-[9px] font-black text-amber-600 uppercase tracking-widest leading-none mt-1">Elite Member</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[9px] font-bold text-gray-400 uppercase">Available</p>
            <p class="text-lg font-black text-gray-900 leading-none">৳ <span id="top-bal">0.00</span></p>
        </div>
    </header>

    <main class="px-6 max-w-md mx-auto">
        
        <section id="home-tab" class="tab-content active-tab space-y-6">
            <div class="premium-card p-8 text-center bg-white relative overflow-hidden">
                <div class="absolute top-0 right-0 w-24 h-24 bg-amber-50 rounded-full -mr-10 -mt-10 opacity-50"></div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[3px] mb-2">Total Balance</p>
                <h1 class="text-5xl font-black text-gray-900 tracking-tighter">৳ <span id="h-bal">0.00</span></h1>
                
                <div class="flex gap-3 mt-8">
                    <button onclick="switchTab('earn')" class="flex-1 gold-action-btn font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">
                        Get Rewards
                    </button>
                    <button onclick="switchTab('wallet')" class="flex-1 bg-gray-100 text-gray-900 font-bold py-4 rounded-2xl active:scale-95 transition">
                        Withdraw
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="premium-card p-5 flex flex-col items-center">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-3">
                        <i class="fas fa-play text-xs"></i>
                    </div>
                    <p class="text-[9px] text-gray-400 font-bold uppercase">Video Ads</p>
                    <p id="h-ads" class="text-xl font-black text-gray-800">0</p>
                </div>
                <div class="premium-card p-5 flex flex-col items-center">
                    <div class="w-10 h-10 bg-orange-50 text-orange-600 rounded-full flex items-center justify-center mb-3">
                        <i class="fas fa-user-plus text-xs"></i>
                    </div>
                    <p class="text-[9px] text-gray-400 font-bold uppercase">Referrals</p>
                    <p id="h-ref" class="text-xl font-black text-gray-800">0</p>
                </div>
            </div>

            <div class="premium-card p-5 border-dashed border-2 border-gray-100">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-3 tracking-widest">Your Referral Link</p>
                <div class="flex gap-2 bg-gray-50 p-2 rounded-xl">
                    <input id="ref-link" readonly value="..." class="flex-1 bg-transparent px-3 text-[11px] text-gray-500 font-medium outline-none">
                    <button onclick="copyRef()" class="bg-white px-4 py-2 rounded-lg text-[10px] font-black shadow-sm active:scale-90 transition">COPY</button>
                </div>
            </div>
        </section>

        <section id="leaderboard-tab" class="tab-content space-y-4">
            <h2 class="text-2xl font-black text-gray-900">Leaderboard</h2>
            <div id="lb-list" class="space-y-3">
                </div>
        </section>

        <section id="earn-tab" class="tab-content space-y-4">
            <h2 class="text-2xl font-black text-gray-900">Tasks</h2>
            <div class="premium-card p-6 flex justify-between items-center bg-white group border-l-4 border-amber-500">
                <div>
                    <p class="font-bold text-gray-800">Daily Video Rewards</p>
                    <p class="text-[10px] text-amber-600 font-bold uppercase tracking-widest mt-1">+ ৳ ০.৫০ Reward</p>
                </div>
                <button class="w-12 h-12 bg-gray-900 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition">
                    <i class="fas fa-play"></i>
                </button>
            </div>
        </section>

        <section id="wallet-tab" class="tab-content space-y-6">
            <h2 class="text-2xl font-black text-gray-900">Withdrawal</h2>
            <div class="premium-card p-6 space-y-5">
                <div class="grid grid-cols-2 gap-3">
                    <button class="p-4 rounded-2xl border border-gray-100 font-bold text-xs hover:bg-pink-50 hover:text-pink-600 transition">bKash</button>
                    <button class="p-4 rounded-2xl border border-gray-100 font-bold text-xs hover:bg-orange-50 hover:text-orange-600 transition">Nagad</button>
                </div>
                <input type="number" placeholder="Enter Amount" class="w-full bg-gray-50 p-5 rounded-2xl border border-transparent focus:bg-white focus:border-gray-200 outline-none transition font-bold text-sm">
                <button class="w-full gold-action-btn font-black py-5 rounded-2xl shadow-xl">Process Request</button>
            </div>
        </section>

        <section id="profile-tab" class="tab-content space-y-6">
            <div class="premium-card p-8 text-center bg-white">
                <img id="p-u-pic" class="w-24 h-24 mx-auto rounded-3xl object-cover mb-4 border-4 border-gray-50">
                <h3 id="p-u-name" class="text-xl font-black text-gray-900">User Name</h3>
                <p id="p-u-id" class="text-[10px] font-mono text-gray-400 mt-1 uppercase tracking-widest"></p>
                
                <div class="flex justify-center gap-2 mt-6">
                    <span class="bg-green-50 text-green-600 text-[10px] px-3 py-1 rounded-full font-bold">Verified ✅</span>
                    <span class="bg-amber-50 text-amber-600 text-[10px] px-3 py-1 rounded-full font-bold">VIP Tier</span>
                </div>
            </div>
            <button onclick="tg.close()" class="w-full bg-red-50 text-red-500 font-bold py-4 rounded-2xl border border-red-100 transition hover:bg-red-500 hover:text-white">
                Exit Application
            </button>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 bottom-nav px-6 py-4 flex justify-around items-center">
        <button onclick="switchTab('home')" id="n-home" class="nav-item nav-active flex flex-col items-center">
            <i class="fas fa-home-alt text-lg"></i>
            <span class="text-[8px] font-bold uppercase mt-1">Home</span>
        </button>
        <button onclick="switchTab('earn')" id="n-earn" class="nav-item flex flex-col items-center">
            <i class="fas fa-rocket text-lg"></i>
            <span class="text-[8px] font-bold uppercase mt-1">Tasks</span>
        </button>
        
        <button onclick="switchTab('leaderboard')" id="n-leaderboard" class="relative -mt-12 w-14 h-14 bg-gray-900 text-amber-500 rounded-2xl flex items-center justify-center shadow-xl border-4 border-[#F8F9FB] active:scale-90 transition">
            <i class="fas fa-trophy text-xl"></i>
        </button>

        <button onclick="switchTab('wallet')" id="n-wallet" class="nav-item flex flex-col items-center">
            <i class="fas fa-wallet text-lg"></i>
            <span class="text-[8px] font-bold uppercase mt-1">Wallet</span>
        </button>
        <button onclick="switchTab('profile')" id="n-profile" class="nav-item flex flex-col items-center">
            <i class="fas fa-user text-lg"></i>
            <span class="text-[8px] font-bold uppercase mt-1">Profile</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#F8F9FB';

        const user = tg.initDataUnsafe.user;
        if(user) {
            const pic = user.photo_url || `https://ui-avatars.com/api/?name=${user.first_name}&background=111&color=fff&bold=true`;
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-pic').src = pic;
            document.getElementById('p-u-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('p-u-pic').src = pic;
            document.getElementById('p-u-id').innerText = "Account ID: " + user.id;
            document.getElementById('ref-link').value = "https://t.me/Lakhpoti_bot?start=" + user.id;
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id + '-tab').classList.add('active-tab');
            
            document.querySelectorAll('nav .nav-item').forEach(b => b.classList.remove('nav-active'));
            const activeBtn = document.getElementById('n-' + id);
            if(activeBtn) activeBtn.classList.add('nav-active');

            if(id === 'leaderboard') loadLeaderboard();
            tg.HapticFeedback.impactOccurred('light');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function loadLeaderboard() {
            const list = document.getElementById('lb-list');
            list.innerHTML = `<div class="text-center py-20 text-gray-400 text-xs font-bold uppercase tracking-widest animate-pulse">Fetching Elite List...</div>`;
            
            setTimeout(() => {
                const users = [
                    {name: "Sajib Ahmed", ref: 540}, {name: "Rakib Khan", ref: 420},
                    {name: "Nahid Hasan", ref: 310}, {name: "Tanvir Ali", ref: 280},
                    {name: "Sumon Rez", ref: 210}
                ];
                list.innerHTML = '';
                users.forEach((u, i) => {
                    list.innerHTML += `
                        <div class="premium-card p-4 flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <span class="text-sm font-black text-gray-200 w-4">#${i+1}</span>
                                <div class="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center font-bold text-gray-800 border border-gray-100 text-xs">${u.name.charAt(0)}</div>
                                <div>
                                    <p class="font-bold text-sm text-gray-800">${u.name}</p>
                                    <p class="text-[9px] text-amber-600 font-bold uppercase tracking-tighter">Verified King</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-gray-900 font-black">${u.ref}</p>
                                <p class="text-[8px] text-gray-400 font-bold uppercase">Refs</p>
                            </div>
                        </div>
                    `;
                });
            }, 800);
        }

        function copyRef() {
            const link = document.getElementById('ref-link');
            link.select();
            document.execCommand('copy');
            tg.showAlert("Link copied to clipboard!");
        }
    </script>
</body>
</html>
