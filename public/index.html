<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lakhpoti BD - Ultra Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body { 
            background: #04070d; 
            color: #ffffff; 
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* প্রিমিয়াম গ্রেডিয়েন্ট ও গ্লাস ইফেক্ট */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
        }

        .gold-gradient-bg {
            background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%);
        }

        .gold-text {
            background: linear-gradient(to bottom, #FFD700, #DAA520);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ট্যাব অ্যানিমেশন */
        .tab-content { display: none; animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .active-tab { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .nav-active {
            color: #FFD700 !important;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.4));
        }

        /* গ্লোয়িং ইফেক্ট */
        .glow { box-shadow: 0 0 20px rgba(255, 215, 0, 0.15); }
    </style>
</head>
<body class="pb-32 px-4">

    <header class="flex justify-between items-center py-6 sticky top-0 bg-[#04070d]/80 backdrop-blur-md z-40">
        <div class="flex items-center gap-3">
            <div class="relative">
                <img id="u-pic" class="w-12 h-12 rounded-2xl border border-white/10 glow" src="https://ui-avatars.com/api/?background=333&color=fff">
                <div class="absolute -bottom-1 -right-1 bg-yellow-500 w-4 h-4 rounded-full border-2 border-[#04070d] flex items-center justify-center">
                    <i class="fas fa-check text-[8px] text-black"></i>
                </div>
            </div>
            <div>
                <h2 id="u-name" class="font-bold text-sm tracking-tight leading-none">Loading...</h2>
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1 inline-block">Pro Level</span>
            </div>
        </div>
        <div class="glass-card px-4 py-2 flex flex-col items-center">
            <p class="text-[8px] font-black text-gray-500 uppercase">Balance</p>
            <p class="text-lg font-black gold-text leading-none mt-1">৳ <span id="top-bal">0.00</span></p>
        </div>
    </header>

    <main class="max-w-md mx-auto">
        
        <section id="home-tab" class="tab-content active-tab space-y-6">
            <div class="glass-card p-8 text-center relative overflow-hidden group">
                <div class="absolute top-0 left-0 w-full h-1 gold-gradient-bg"></div>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-[5px]">Account Value</p>
                <h1 class="text-6xl font-black mt-4 mb-8 tracking-tighter">৳ <span id="h-bal">0.00</span></h1>
                
                <div class="flex gap-4">
                    <button onclick="switchTab('earn')" class="flex-1 gold-gradient-bg text-black font-extrabold py-4 rounded-2xl shadow-lg active:scale-95 transition">
                        Quick Earn
                    </button>
                    <button onclick="switchTab('wallet')" class="flex-1 bg-white/5 font-bold py-4 rounded-2xl border border-white/10 active:scale-95 transition">
                        Cash Out
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-5 flex flex-col items-center border-b-2 border-blue-500/50">
                    <i class="fas fa-bolt text-blue-500 mb-2"></i>
                    <p class="text-[10px] text-gray-500 font-black uppercase">Ad Power</p>
                    <p id="h-ads" class="text-2xl font-black mt-1">0</p>
                </div>
                <div class="glass-card p-5 flex flex-col items-center border-b-2 border-emerald-500/50">
                    <i class="fas fa-link text-emerald-500 mb-2"></i>
                    <p class="text-[10px] text-gray-500 font-black uppercase">Network</p>
                    <p id="h-ref" class="text-2xl font-black mt-1">0</p>
                </div>
            </div>

            <div class="glass-card p-6 border border-yellow-500/10">
                <div class="flex items-center justify-between mb-4">
                    <p class="text-xs font-bold gold-text uppercase tracking-widest">Share & Multiply</p>
                    <i class="fas fa-share-nodes text-yellow-500/50"></i>
                </div>
                <div class="flex gap-2 bg-black/40 p-2 rounded-2xl">
                    <input id="ref-link" readonly value="..." class="flex-1 bg-transparent px-3 text-[10px] text-gray-500 outline-none">
                    <button onclick="copyRef()" class="gold-gradient-bg text-black px-5 py-2 rounded-xl text-[10px] font-black active:scale-90 transition">COPY</button>
                </div>
            </div>
        </section>

        <section id="leaderboard-tab" class="tab-content space-y-4">
            <div class="text-center py-4">
                <h2 class="text-3xl font-black italic gold-text">Top Performers</h2>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[4px]">Elite 20 Users</p>
            </div>
            <div id="lb-list" class="space-y-3">
                </div>
        </section>

        <section id="earn-tab" class="tab-content space-y-4">
            <h2 class="text-2xl font-black mb-6 italic">Active Tasks</h2>
            <div class="glass-card p-6 flex justify-between items-center group">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 text-xl">
                        <i class="fas fa-play"></i>
                    </div>
                    <div>
                        <p class="font-bold">Premium Video Ad</p>
                        <p class="text-xs text-green-500 font-bold">+ ৳ ০.৫০ Per View</p>
                    </div>
                </div>
                <button onclick="tg.HapticFeedback.notificationOccurred('success')" class="bg-white text-black w-10 h-10 rounded-full flex items-center justify-center active:scale-90 transition">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </section>

        <section id="wallet-tab" class="tab-content space-y-6">
            <h2 class="text-2xl font-black italic">Withdrawal</h2>
            <div class="glass-card p-6 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-6 rounded-[2rem] border-2 border-pink-500/20 bg-pink-500/5 text-center transition hover:border-pink-500">
                        <p class="font-black text-pink-500 italic">bKash</p>
                    </div>
                    <div class="p-6 rounded-[2rem] border-2 border-orange-500/20 bg-orange-500/5 text-center transition hover:border-orange-500">
                        <p class="font-black text-orange-500 italic">Nagad</p>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Amount to withdraw</label>
                    <input type="number" placeholder="Min. 50 BDT" class="w-full bg-white/5 p-5 rounded-[2rem] border border-white/10 outline-none focus:border-yellow-500 transition font-bold">
                </div>
                <button class="w-full gold-gradient-bg text-black font-black py-5 rounded-[2rem] shadow-xl">Submit Request</button>
            </div>
        </section>

        <section id="profile-tab" class="tab-content space-y-6">
            <div class="glass-card p-8 text-center relative">
                <div class="w-28 h-28 mx-auto rounded-3xl border-4 border-[#04070d] glow overflow-hidden shadow-2xl">
                    <img id="p-u-pic" class="w-full h-full object-cover">
                </div>
                <h3 id="p-u-name" class="text-2xl font-black mt-4 gold-text">Name</h3>
                <p id="p-u-id" class="text-[10px] font-mono text-gray-500 mt-1 uppercase tracking-widest tracking-tighter"></p>
                
                <div class="grid grid-cols-2 gap-4 mt-8">
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <p class="text-[8px] font-black text-gray-500 uppercase">Status</p>
                        <p class="text-xs font-bold text-emerald-500">Active Account</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <p class="text-[8px] font-black text-gray-500 uppercase">Plan</p>
                        <p class="text-xs font-bold text-yellow-500 italic font-black">Lifetime Pro</p>
                    </div>
                </div>
            </div>
            
            <button onclick="tg.close()" class="w-full bg-red-500/10 text-red-500 font-bold py-4 rounded-2xl border border-red-500/20">
                Log Out Application
            </button>
        </section>

    </main>

    <nav class="fixed bottom-8 left-6 right-6 z-50">
        <div class="glass-card flex justify-around items-center p-3 shadow-[0_20px_50px_rgba(0,0,0,0.8)] border-white/10">
            <button onclick="switchTab('home')" id="n-home" class="nav-active flex flex-col items-center p-2">
                <i class="fas fa-house-chimney text-lg"></i>
                <span class="text-[8px] font-black uppercase mt-1">Home</span>
            </button>
            <button onclick="switchTab('earn')" id="n-earn" class="flex flex-col items-center p-2 text-gray-600">
                <i class="fas fa-layer-group text-lg"></i>
                <span class="text-[8px] font-black uppercase mt-1">Earn</span>
            </button>
            
            <button onclick="switchTab('leaderboard')" id="n-leaderboard" class="relative -mt-16 w-16 h-16 gold-gradient-bg rounded-full flex items-center justify-center text-black border-[6px] border-[#04070d] shadow-2xl shadow-yellow-500/30 active:scale-90 transition transform">
                <i class="fas fa-trophy text-2xl"></i>
            </button>

            <button onclick="switchTab('wallet')" id="n-wallet" class="flex flex-col items-center p-2 text-gray-600">
                <i class="fas fa-wallet text-lg"></i>
                <span class="text-[8px] font-black uppercase mt-1">Wallet</span>
            </button>
            <button onclick="switchTab('profile')" id="n-profile" class="flex flex-col items-center p-2 text-gray-600">
                <i class="fas fa-user-ninja text-lg"></i>
                <span class="text-[8px] font-black uppercase mt-1">Profile</span>
            </button>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#04070d';

        // ইউজার ডাটা লোড
        const user = tg.initDataUnsafe.user;
        if(user) {
            const pic = user.photo_url || `https://ui-avatars.com/api/?name=${user.first_name}&background=facc15&color=000&bold=true`;
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-pic').src = pic;
            document.getElementById('p-u-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('p-u-pic').src = pic;
            document.getElementById('p-u-id').innerText = "ID: " + user.id;
            document.getElementById('ref-link').value = "https://t.me/Lakhpoti_bot?start=" + user.id;
        }

        // ট্যাব লজিক
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id + '-tab').classList.add('active-tab');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-gray-600'));
            const activeBtn = document.getElementById('n-' + id);
            if(activeBtn) activeBtn.classList.add('nav-active');

            if(id === 'leaderboard') loadLeaderboard();
            tg.HapticFeedback.impactOccurred('medium');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function loadLeaderboard() {
            const list = document.getElementById('lb-list');
            list.innerHTML = `<div class="text-center py-20 text-gray-700 uppercase font-black tracking-widest text-xs animate-pulse">Syncing Leaderboard...</div>`;
            
            setTimeout(() => {
                const users = [
                    {name: "Sajib Ahmed", ref: 480}, {name: "Rakib", ref: 390},
                    {name: "Nahid Hasan", ref: 310}, {name: "Mehedi", ref: 250},
                    {name: "Abir", ref: 190}
                ];
                list.innerHTML = '';
                users.forEach((u, i) => {
                    list.innerHTML += `
                        <div class="glass-card p-5 flex justify-between items-center border-l-4 ${i < 3 ? 'border-yellow-500' : 'border-transparent'}">
                            <div class="flex items-center gap-4">
                                <span class="text-sm font-black text-gray-600 w-4">#${i+1}</span>
                                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center font-bold text-yellow-500 border border-white/10">${u.name.charAt(0)}</div>
                                <div>
                                    <p class="font-bold text-sm">${u.name}</p>
                                    <p class="text-[8px] text-gray-600 font-black uppercase">Level ${5-i}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="gold-text font-black text-lg leading-none">${u.ref}</p>
                                <p class="text-[8px] text-gray-600 font-black uppercase">Points</p>
                            </div>
                        </div>
                    `;
                });
            }, 800);
        }

        function copyRef() {
            const link = document.getElementById('ref-link');
            link.select();
            document.execCommand('copy');
            tg.showPopup({ message: "Referral link copied!" });
        }
    </script>
</body>
</html>
